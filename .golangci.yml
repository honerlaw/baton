run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gofumpt
    - goimports
    - misspell
    - unconvert
    - revive
    - bodyclose
    - errorlint
    - nolintlint

linters-settings:
  errcheck:
    # Don't require checking errors from these — their failure is not
    # actionable at the call site.
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true
      - name: unreachable-code
      - name: redefines-builtin-id
  goimports:
    local-prefixes: github.com/honerlaw/baton

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files get a pass on error checks that would only add noise.
    - path: _test\.go
      linters:
        - errcheck
        - revive
    # Assets package is just //go:embed wiring.
    - path: internal/assets/assets\.go
      linters:
        - revive
