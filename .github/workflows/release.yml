name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist, e.g. v1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if [ -n "$tag" ]; then
            echo "version=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          bin=baton
          if [ "$GOOS" = "windows" ]; then bin=baton.exe; fi
          go build -trimpath \
            -ldflags "-s -w -X github.com/honerlaw/baton/internal/cli.Version=${VERSION}" \
            -o "dist/${bin}" ./cmd/baton

      - name: Package
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          stage="baton_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${stage}"
          if [ "$GOOS" = "windows" ]; then
            cp dist/baton.exe "dist/${stage}/"
          else
            cp dist/baton "dist/${stage}/"
          fi
          cp README.md "dist/${stage}/" 2>/dev/null || true
          cp LICENSE "dist/${stage}/" 2>/dev/null || true
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip -r "${stage}.zip" "${stage}"
            sha256sum "${stage}.zip" > "${stage}.zip.sha256"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
            sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi
          rm -rf "${stage}"
          rm -f baton baton.exe

      - uses: actions/upload-artifact@v4
        with:
          name: baton-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > checksums.txt
          rm -f *.sha256

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if [ -n "$tag" ]; then
            echo "version=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
